<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vela Cloud · Knowledge Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0d13; --surface:#0f131c; --surface2:#151b27; --line:#222a3a;
    --text:#e8ebf2; --muted:#868ea3; --faint:#5b6377;
    --signal:#46e0c0; --signal-ink:#04231d; --violet:#8aa2ff; --danger:#ff7a7a;
    --display:"Space Grotesk",sans-serif; --body:"Inter",sans-serif; --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--ink); color:var(--text); font-family:var(--body);
    display:flex; flex-direction:column; height:100dvh; -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 420px at 78% -8%, rgba(70,224,192,.10), transparent 70%);
  }

  /* ---- top status bar ---- */
  .topbar{
    display:flex; align-items:center; gap:14px; padding:13px 20px;
    border-bottom:1px solid var(--line); background:rgba(15,19,28,.86); backdrop-filter:blur(8px);
  }
  .mark{width:26px;height:26px;flex:0 0 auto;}
  .brand{display:flex; align-items:baseline; gap:9px; min-width:0;}
  .brand b{font-family:var(--display); font-weight:700; letter-spacing:.2px; font-size:16px;}
  .brand span{font-size:12px; color:var(--muted); white-space:nowrap;}
  .brand .bar{color:var(--faint);}
  .status{margin-left:auto; display:flex; align-items:center; gap:10px;}
  .pill{
    display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px;
    color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:5px 11px; background:var(--surface);
  }
  .dot{width:7px;height:7px;border-radius:50%; background:var(--signal); box-shadow:0 0 0 0 rgba(70,224,192,.55); animation:pulse 2.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,224,192,.5)}70%{box-shadow:0 0 0 7px rgba(70,224,192,0)}100%{box-shadow:0 0 0 0 rgba(70,224,192,0)}}
  .pill b{color:var(--signal); font-weight:500;}

  /* ---- conversation stream ---- */
  .stream{flex:1; overflow-y:auto; padding:26px 20px 8px;}
  .inner{max-width:780px; margin:0 auto; display:flex; flex-direction:column; gap:20px;}

  .hello{padding:14px 2px 4px;}
  .hello h2{font-family:var(--display); font-weight:600; font-size:21px; margin:0 0 6px; letter-spacing:-.2px;}
  .hello p{margin:0; color:var(--muted); font-size:14px; line-height:1.55; max-width:48ch;}
  .probes{display:flex; flex-wrap:wrap; gap:9px; margin-top:16px;}
  .probe{
    font-family:var(--body); font-size:13px; color:var(--text); background:var(--surface2);
    border:1px solid var(--line); border-radius:10px; padding:9px 13px; cursor:pointer;
    transition:border-color .15s, transform .1s, background .15s; text-align:left;
  }
  .probe:hover{border-color:var(--signal); background:#19222f;}
  .probe:active{transform:translateY(1px);}
  .probe em{font-style:normal; color:var(--faint); font-family:var(--mono); font-size:11px; margin-left:7px;}

  .msg{display:flex; gap:12px; animation:rise .28s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(7px)} to{opacity:1; transform:none}}
  .msg--user{flex-direction:row-reverse;}
  .avatar{width:30px;height:30px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;
    font-family:var(--mono); font-size:12px; font-weight:500; margin-top:2px;}
  .msg--bot .avatar{background:rgba(70,224,192,.12); color:var(--signal); border:1px solid rgba(70,224,192,.3);}
  .msg--user .avatar{background:rgba(138,162,255,.12); color:var(--violet); border:1px solid rgba(138,162,255,.3);}
  .body{min-width:0; max-width:84%;}
  .msg--user .body{display:flex; flex-direction:column; align-items:flex-end;}

  .bubble{font-size:14.5px; line-height:1.62; padding:12px 15px; border-radius:13px; white-space:pre-wrap; word-wrap:break-word;}
  .msg--user .bubble{background:rgba(138,162,255,.10); border:1px solid rgba(138,162,255,.22);}
  .msg--bot .bubble{
    background:var(--surface2); border:1px solid var(--line);
    border-left:2px solid var(--signal); border-top-left-radius:6px;
  }

  .sources{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px;}
  .src{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px;
    color:var(--muted); background:var(--surface); border:1px solid var(--line);
    border-radius:7px; padding:4px 9px;
  }
  .src::before{content:""; width:5px;height:5px;border-radius:50%; background:var(--signal); opacity:.8;}
  .telemetry{margin-top:9px; font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.2px;}
  .telemetry b{color:var(--muted); font-weight:400;}

  .wave{display:flex; align-items:flex-end; gap:3px; height:16px; padding:4px 2px;}
  .wave i{width:3px; height:5px; background:var(--signal); border-radius:2px; animation:eq 1s ease-in-out infinite;}
  .wave i:nth-child(2){animation-delay:.15s} .wave i:nth-child(3){animation-delay:.3s}
  .wave i:nth-child(4){animation-delay:.45s} .wave i:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:4px;opacity:.5}50%{height:15px;opacity:1}}

  .err{color:var(--danger); border-left-color:var(--danger)!important;}

  /* ---- composer ---- */
  .composer{border-top:1px solid var(--line); background:rgba(15,19,28,.9); backdrop-filter:blur(8px); padding:14px 20px;}
  .field{max-width:780px; margin:0 auto; display:flex; gap:10px; align-items:center;
    background:var(--surface2); border:1px solid var(--line); border-radius:13px; padding:6px 6px 6px 14px; transition:border-color .15s;}
  .field:focus-within{border-color:var(--signal);}
  .prompt{font-family:var(--mono); color:var(--signal); font-size:14px; opacity:.8;}
  #q{flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:var(--body); font-size:14.5px; padding:8px 0;}
  #q::placeholder{color:var(--faint);}
  .send{font-family:var(--display); font-weight:600; font-size:13.5px; color:var(--signal-ink);
    background:var(--signal); border:none; border-radius:9px; padding:10px 18px; cursor:pointer; transition:opacity .15s, transform .1s;}
  .send:hover{opacity:.92;} .send:active{transform:translateY(1px);}
  .send:disabled{opacity:.45; cursor:default;}
  .foot{max-width:780px; margin:8px auto 0; font-size:11px; color:var(--faint); text-align:center;}

  @media (max-width:560px){ .body{max-width:100%;} .brand span{display:none;} .stream{padding:18px 14px 4px;} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;} }
</style>
</head>
<body>
  <div class="topbar">
    <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M16 3 L27 27 L16 21 L5 27 Z" fill="#46e0c0" opacity="0.92"/>
      <path d="M16 3 L16 21 L5 27 Z" fill="#46e0c0" opacity="0.55"/>
    </svg>
    <div class="brand">
      <b>Vela Cloud</b><span class="bar">/</span><span>Knowledge Console</span>
    </div>
    <div class="status">
      <span class="pill"><span class="dot"></span>online</span>
      <span class="pill" id="modepill">retrieval&nbsp;<b id="mode">…</b></span>
    </div>
  </div>

  <div class="stream" id="stream">
    <div class="inner" id="inner">
      <div class="hello" id="hello">
        <h2>Ask the company knowledge base</h2>
        <p>Answers are drawn only from Vela Cloud's internal documents, and every answer shows its sources. Try one:</p>
        <div class="probes" id="probes">
          <button class="probe" type="button">How much vacation do staff in Germany get?</button>
          <button class="probe" type="button">What does error OKTA-403 mean?<em>code</em></button>
          <button class="probe" type="button">How do I restart the billing-service?<em>ops</em></button>
          <button class="probe" type="button">Does Vela Cloud offer a sabbatical?<em>should refuse</em></button>
        </div>
      </div>
    </div>
  </div>

  <form class="composer" id="form">
    <div class="field">
      <span class="prompt">&gt;</span>
      <input id="q" autocomplete="off" placeholder="Ask about HR, engineering, IT, ops…" />
      <button class="send" id="send" type="submit">Ask</button>
    </div>
    <div class="foot">Retrieval-augmented · grounded in 109 internal documents</div>
  </form>

<script>
  const inner = document.getElementById('inner');
  const stream = document.getElementById('stream');
  const form = document.getElementById('form');
  const input = document.getElementById('q');
  const sendBtn = document.getElementById('send');
  const hello = document.getElementById('hello');

  fetch('/health').then(r => r.json()).then(d => {
    document.getElementById('mode').textContent = d.retrieval_mode || 'ready';
  }).catch(() => { document.getElementById('mode').textContent = 'ready'; });

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function add(role, inner_html){
    const m = document.createElement('div');
    m.className = 'msg msg--' + role;
    m.innerHTML = '<div class="avatar">' + (role === 'bot' ? 'V' : 'You') + '</div>'
                + '<div class="body">' + inner_html + '</div>';
    document.getElementById('inner').appendChild(m);
    stream.scrollTop = stream.scrollHeight;
    return m.querySelector('.body');
  }

  async function send(question){
    if (hello) hello.remove();
    add('user', '<div class="bubble">' + esc(question) + '</div>');
    sendBtn.disabled = true; input.disabled = true;
    const body = add('bot', '<div class="bubble"><div class="wave"><i></i><i></i><i></i><i></i><i></i></div></div>');

    try{
      const res = await fetch('/ask', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question })
      });
      if(!res.ok){
        const msg = res.status === 429
          ? "Daily free quota reached. Try again after midnight Pacific, or enable billing on the Gemini project."
          : ("Request failed (" + res.status + ").");
        body.innerHTML = '<div class="bubble err">' + msg + '</div>';
        return;
      }
      const data = await res.json();
      const chips = (data.sources || [])
        .map(s => '<span class="src">' + esc(s.title || s.source || '') + '</span>').join('');
      body.innerHTML =
        '<div class="bubble">' + esc(data.answer) + '</div>' +
        (chips ? '<div class="sources">' + chips + '</div>' : '') +
        '<div class="telemetry"><b>' + data.latency_ms + 'ms</b> · ' + (data.retrieval_mode || '') + '</div>';
    }catch(e){
      body.innerHTML = '<div class="bubble err">Can\'t reach the server. Is it still running?</div>';
    }finally{
      sendBtn.disabled = false; input.disabled = false; input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if(!q) return;
    input.value = '';
    send(q);
  });

  document.getElementById('probes').addEventListener('click', (e) => {
    const btn = e.target.closest('.probe');
    if(!btn) return;
    send(btn.firstChild.textContent.trim());
  });
</script>
</body>
</html>
